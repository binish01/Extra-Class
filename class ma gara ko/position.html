<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css position</title>
    <style>

    .{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container{
        position: relative;
        height: 250px;
        border: 2px solid black;
        margin: 20px;
        padding: 20px;
    }
    .box{
        position: fixed;
        height: 100px;
        width: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .relative{
        background-color: blue;
        position: relative;
        top: 30px;
        left: 20px;
    }

    .absolute{
        background-color: pink;
        position: absolute;
        top: 20px;
        right: 20px;
    }

    .fixed{
        position: fixed;
        background-color: green;
        bottom: 20px;
        right: 20px;

    }

    .sticky{
background-color: yellow;
position: sticky;
top: 0;
    }
    </style>
</head>
<body>
    <h2>CSS position Examples</h2>
    <div class="box sticky">sticky</div>
    <div class="container">
        <div class="box relative">Relative</div>
        <div class="box absolute">Absolutes</div>
    </div>
    <div class="box fixed">Fixed</div>
    <div class="spacer">Scroll down to see sticker and fixed behaviour</div>
</body>
</html>
