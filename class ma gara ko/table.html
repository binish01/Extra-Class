<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table & Nested Table</title>
</head>
<body>
    <a href="introduction.html"> Home</a> <br>
    

    Table Example
    <table border="1" bordercolor="skyblue">
        <tr>
            <th> S.N</th>
            <th>Students name</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Hari</td>
            <td>Chitwan</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Sita</td>
            <td>Janakpur</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Ram</td>
            <td>Kathmandu</td>
        </tr>
    </table>
    <h2>Nested Table</h2>
    <table border="1" bordercolor="red">
        <tr>
            <td>Table 1</td>
            <td>
                Table 2
                <table border="2"bordercolor=green>
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                        
                    </tr>
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td>Table 1</td>
            <td>Table 2</td>
        </tr>
    </table>
    <h2> Row and Colm</h2>
    <table border="1">
        <tr>
            <th colspan="2">Class Routine</th>
        </tr>
        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr>
        <tr>
            <td>Sunday</td>
            <td>Statics</td>
        </tr>
        <tr>
            <td>Monday</td>
            <td rowspan="2">Microprosser</td>
        </tr>
        <tr>
            <td>Tuesday</td>
        </tr>
    </table>
</body>
</html>
